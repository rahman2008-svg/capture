workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - chmod +x ./gradlew
      - ./gradlew clean
      - ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/mapping.txt

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
